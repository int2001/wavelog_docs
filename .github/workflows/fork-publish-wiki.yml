# FORK-ONLY — do NOT include this file in PRs to wavelog/wavelog_docs.
# Publishes the contents of docs/ to the GitHub wiki of this repository.
name: Fork — Publish wiki
on:
  push:
    branches:
      - master
permissions:
  contents: write
jobs:
  publish-wiki:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Clone wiki
        run: |
          git clone \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git \
            wiki

      - name: Sync docs to wiki
        run: rsync -av --delete --exclude='.git' docs/ wiki/

      - name: Create wiki home page from index.md
        run: cp wiki/index.md wiki/Home.md

      - name: Commit and push
        run: |
          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet \
            || git commit -m "wiki: sync from docs @ ${{ github.sha }}"
          git push
