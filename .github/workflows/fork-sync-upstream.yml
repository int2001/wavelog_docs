# FORK-ONLY — do NOT include this file in PRs to wavelog/wavelog_docs.
# Rebases this fork's master on top of wavelog/wavelog_docs:master.
name: Fork — Sync upstream
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/wavelog/wavelog_docs.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Rebase onto upstream/master
        run: git rebase upstream/master

      - name: Push
        run: git push origin master --force-with-lease
